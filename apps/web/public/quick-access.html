<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CredX Quick Access</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg:#07111f; --card:#0d1828; --text:#e8eef7; --muted:#9fb0c3; --line:#223247; --accent:#00c6fb;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#07111f,#0a1423); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,420px); background:rgba(13,24,40,.96); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 30px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 10px; font-size:28px; }
    p { color:var(--muted); line-height:1.55; }
    label { display:block; margin-top:14px; font-size:13px; color:var(--text); }
    input { width:100%; margin-top:6px; padding:14px; border-radius:12px; border:1px solid var(--line); background:#08111d; color:var(--text); font:inherit; }
    .row { display:flex; gap:10px; align-items:center; }
    .row input { flex:1; }
    button { height:46px; border-radius:12px; border:1px solid transparent; padding:0 16px; font-weight:700; cursor:pointer; }
    .primary { width:100%; margin-top:18px; background:var(--accent); color:#04111e; }
    .ghost { background:transparent; border-color:var(--line); color:var(--text); }
    .error { margin-top:12px; padding:12px 14px; background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.28); color:#ffd1d1; border-radius:12px; display:none; }
    .ok { margin-top:12px; padding:12px 14px; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.28); color:#d7ffe4; border-radius:12px; display:none; }
    .small { font-size:12px; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>CredX Quick Access</h1>
    <p>This is the fallback sign-in page. It bypasses the main portal login UI and signs you in directly.</p>
    <form id="login-form" autocomplete="on" novalidate>
      <label>Email
        <input id="email" name="email" type="email" autocomplete="username email" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email" placeholder="you@example.com" required />
      </label>
      <label>Password</label>
      <div class="row">
        <input id="password" name="password" type="password" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Password" required />
        <button class="ghost" id="toggle" type="button">View</button>
      </div>
      <button class="primary" id="submit" type="submit">Sign in</button>
    </form>
    <div class="error" id="error"></div>
    <div class="ok" id="ok"></div>
    <p class="small">After sign-in, you’ll be redirected to the normal portal dashboard.</p>
  </div>
  <script>
    const API_BASE = 'https://credxapi-production.up.railway.app';
    const TOKEN_KEY = 'credx-client-token';
    const USER_KEY = 'credx-client-user';
    const form = document.getElementById('login-form');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const toggle = document.getElementById('toggle');
    const submit = document.getElementById('submit');
    const errorBox = document.getElementById('error');
    const okBox = document.getElementById('ok');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
      okBox.style.display = 'none';
    }
    function showOk(message) {
      okBox.textContent = message;
      okBox.style.display = 'block';
      errorBox.style.display = 'none';
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      localStorage.setItem(TOKEN_KEY, token);
      showOk('Token accepted. Redirecting…');
      setTimeout(() => { window.location.replace('/portal'); }, 600);
    }

    toggle.addEventListener('click', () => {
      const visible = password.type === 'text';
      password.type = visible ? 'password' : 'text';
      toggle.textContent = visible ? 'View' : 'Hide';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      okBox.style.display = 'none';
      submit.disabled = true;
      submit.textContent = 'Signing in…';
      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email: email.value.trim(), password: password.value })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `Login failed (${response.status})`);
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        showOk('Signed in. Redirecting…');
        setTimeout(() => { window.location.replace('/portal'); }, 500);
      } catch (error) {
        showError(error.message || 'Unable to sign in.');
      } finally {
        submit.disabled = false;
        submit.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
